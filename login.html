<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Studo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 80px 16px 40px; background: var(--bg-primary); position: relative; overflow: hidden; }
    .auth-orb { position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; }
    .auth-card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius-2xl); padding: 40px 36px; width: 100%; max-width: 420px; box-shadow: var(--shadow-lg); position: relative; z-index: 1; animation: fadeInUp 0.5s ease both; }
    .auth-logo { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 28px; }
    .auth-logo-icon { width: 44px; height: 44px; background: linear-gradient(135deg, #0071e3, #5856d6); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .auth-logo-text { font-size: 24px; font-weight: 800; color: var(--text-primary); }
    .auth-heading { font-size: 24px; font-weight: 700; color: var(--text-primary); text-align: center; margin-bottom: 6px; letter-spacing: -0.5px; }
    .auth-subtitle { font-size: 14px; color: var(--text-secondary); text-align: center; margin-bottom: 28px; line-height: 1.5; }
    .pw-wrapper { position: relative; }
    .pw-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-tertiary); display: flex; align-items: center; padding: 4px; border-radius: 6px; }
    .pw-toggle:hover { color: var(--accent-blue); }
    .pw-wrapper .input-field { padding-right: 40px; }
    .forgot-link { font-size: 13px; color: var(--accent-blue); text-decoration: none; font-weight: 500; }
    .forgot-link:hover { text-decoration: underline; }
    .auth-divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
    .auth-divider-line { flex: 1; height: 1px; background: var(--border-light); }
    .auth-divider-text { font-size: 12px; color: var(--text-tertiary); font-weight: 500; }
    .google-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 11px 16px; border: 1px solid var(--border-light); border-radius: var(--radius-md); background: var(--bg-card); color: var(--text-primary); font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s, box-shadow 0.2s; }
    .google-btn:hover { background: var(--bg-secondary); box-shadow: var(--shadow-sm); }
    .auth-footer-text { font-size: 13px; color: var(--text-secondary); text-align: center; margin-top: 20px; }
    .auth-footer-text a { color: var(--accent-blue); text-decoration: none; font-weight: 600; }
    .auth-footer-text a:hover { text-decoration: underline; }
    .mjpru-note { font-size: 11px; color: var(--text-tertiary); text-align: center; margin-top: 16px; padding: 8px 12px; background: var(--bg-secondary); border-radius: 8px; line-height: 1.5; }
    .error-msg { font-size: 13px; color: #ff3b30; text-align: center; margin-top: -8px; margin-bottom: 8px; display: none; padding: 8px 12px; background: #fff0f0; border-radius: 8px; border: 1px solid #ffd0d0; }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)} }
    .btn-full { width: 100%; justify-content: center; }
  </style>
</head>
<body>
  <main style="padding-top:0;min-height:100vh;background:var(--bg-primary);">
    <div class="auth-page">
      <!-- BG orbs -->
      <div class="auth-orb" style="width:500px;height:500px;top:-200px;right:-150px;background:radial-gradient(circle,rgba(88,86,214,0.14) 0%,transparent 70%);"></div>
      <div class="auth-orb" style="width:400px;height:400px;bottom:-120px;left:-150px;background:radial-gradient(circle,rgba(0,113,227,0.12) 0%,transparent 70%);"></div>

      <div class="auth-card">
        <!-- Logo -->
        <div class="auth-logo">
          <div class="auth-logo-icon">📚</div>
          <span class="auth-logo-text">Studo</span>
        </div>

        <h1 class="auth-heading">Welcome back</h1>
        <p class="auth-subtitle">Sign in to your MJPRU Studo account</p>

        <div id="error-msg" class="error-msg">❌ Invalid email or password. Try again.</div>

        <form id="login-form" style="display:flex;flex-direction:column;gap:14px;">
          <!-- Email -->
          <div class="form-group">
            <label class="form-label">University Email</label>
            <input type="email" id="login-email" class="input-field" placeholder="you@mjpru.ac.in" value="faizan.ali@mjpru.ac.in" autocomplete="email" required>
          </div>

          <!-- Password -->
          <div class="form-group">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
              <label class="form-label" style="margin-bottom:0;">Password</label>
              <a href="#" class="forgot-link">Forgot password?</a>
            </div>
            <div class="pw-wrapper">
              <input type="password" id="login-password" class="input-field" placeholder="Enter your password" value="demo123" autocomplete="current-password" required>
              <button type="button" class="pw-toggle" id="pw-toggle" title="Show/hide password">
                <i data-lucide="eye" id="pw-icon" style="width:16px;height:16px;"></i>
              </button>
            </div>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn-primary btn-full" id="login-btn" style="margin-top:4px;padding:13px;">
            Sign In
          </button>
        </form>

        <!-- Divider -->
        <div class="auth-divider">
          <div class="auth-divider-line"></div>
          <span class="auth-divider-text">or continue with</span>
          <div class="auth-divider-line"></div>
        </div>

        <!-- Google btn -->
        <button class="google-btn" onclick="alert('Google login — coming soon! Use demo credentials above.')">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#4285F4" d="M47.5 24.5c0-1.56-.14-3.06-.4-4.5H24v8.51h13.22c-.57 2.98-2.29 5.5-4.88 7.19v5.97h7.9c4.62-4.25 7.26-10.52 7.26-17.17z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.15 15.9-5.83l-7.9-5.97c-2.15 1.44-4.9 2.29-8 2.29-6.15 0-11.37-4.15-13.23-9.73H2.6v6.17C6.55 42.69 14.68 48 24 48z"/><path fill="#FBBC05" d="M10.77 28.76A14.92 14.92 0 0 1 9.75 24c0-1.66.29-3.27.79-4.76V13.07H2.6A23.94 23.94 0 0 0 0 24c0 3.87.93 7.54 2.6 10.93l8.17-6.17z"/><path fill="#EA4335" d="M24 9.5c3.47 0 6.58 1.2 9.02 3.53l6.76-6.76C35.93 2.38 30.48 0 24 0 14.68 0 6.55 5.31 2.6 13.07l8.17 6.17C12.63 13.65 17.85 9.5 24 9.5z"/></svg>
          Continue with Google
        </button>

        <!-- Switch to register -->
        <p class="auth-footer-text">
          Don't have an account? <a href="register.html">Create one</a>
        </p>

        <!-- Note -->
        <div class="mjpru-note">
          🎓 MJPRU students only · @mjpru.ac.in email required<br>
          <strong>Demo:</strong> faizan.ali@mjpru.ac.in / demo123
        </div>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      lucide.createIcons();

      // Password show/hide
      const pwToggle = document.getElementById('pw-toggle');
      const pwInput  = document.getElementById('login-password');
      const pwIcon   = document.getElementById('pw-icon');
      let   pwVisible = false;

      pwToggle.addEventListener('click', function () {
        pwVisible = !pwVisible;
        pwInput.type = pwVisible ? 'text' : 'password';
        pwIcon.setAttribute('data-lucide', pwVisible ? 'eye-off' : 'eye');
        lucide.createIcons();
      });

      // Login form submit
      const form    = document.getElementById('login-form');
      const errMsg  = document.getElementById('error-msg');
      const loginBtn = document.getElementById('login-btn');

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        const email = document.getElementById('login-email').value.trim().toLowerCase();
        const pass  = document.getElementById('login-password').value;

        errMsg.style.display = 'none';
        loginBtn.textContent = 'Signing in…';
        loginBtn.disabled = true;

        setTimeout(function () {
          // Demo: accept currentUser email or any @mjpru.ac.in with "demo123"
          const demoEmails = [
            'faizan.ali@mjpru.ac.in',
            'priya.sharma@mjpru.ac.in',
            'rahul.verma@mjpru.ac.in',
            'anjali.singh@mjpru.ac.in',
          ];
          const valid = (demoEmails.includes(email) && pass === 'demo123') ||
                        (email.endsWith('@mjpru.ac.in') && pass.length >= 6);

          if (valid) {
            // Log in as Faizan Ali (demo)
            auth.login({
              id: 'u1',
              name: 'Faizan Ali',
              initials: 'FA',
              email: 'faizan.ali@mjpru.ac.in',
              university: 'MJPRU, Bareilly',
              semester: '3rd Semester',
              verified: true,
              avatarColor: 'linear-gradient(135deg, #0071e3, #5856d6)',
              isCreator: true,
            }, 'demo-token-123');
            loginBtn.textContent = '✅ Signed in! Redirecting…';
            loginBtn.style.background = '#34c759';
            setTimeout(() => { window.location.href = 'feed.html'; }, 800);
          } else {
            errMsg.style.display = 'block';
            loginBtn.textContent = 'Sign In';
            loginBtn.disabled = false;
          }
        }, 900);
      });
    });
  </script>
</body>
</html>
